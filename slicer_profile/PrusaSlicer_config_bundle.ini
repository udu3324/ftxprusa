printer_notes = \nthis is the printer profile for the folger tech ft-6 x prusa mk3s+ fusion\n\nit is based off the "Original Prusa i3 MK3" profile but with modified print area + more\n\nit should be, in theory, compatible with all mk3 filament/layer speed profiles as its reusing the same prusa hotend\n\nby udu3324\n\n\nDon't remove the following keywords! These keywords are used in the "compatible printer" condition of the print and filament profiles to link the particular print and filament profiles to this printer profile.\nPRINTER_VENDOR_PRUSA3D\nPRINTER_MODEL_MK3\n
