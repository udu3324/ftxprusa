# WARNING: DO NOT EDIT THIS FILE UNLESS YOU KNOW WHAT YOU ARE DOING

[stepper_x]
step_pin: PC0
dir_pin: !PL0
enable_pin: !PA7
microsteps: 16
rotation_distance: 32
endstop_pin: tmc2130_stepper_x:virtual_endstop
position_endstop: 0
position_max: 650
homing_speed: 70
# https://www.klipper3d.org/TMC_Drivers.html?h=sensorless+homing#configure-printercfg-for-sensorless-homing
# The homing_retract_dist setting should be set to zero to disable the second homing move as a second pass is not needed, and attempts to do so are error prone.
homing_retract_dist: 0

[stepper_y]
step_pin: PC1
dir_pin: !PL1
enable_pin: !PA6
microsteps: 16
rotation_distance: 32
endstop_pin: tmc2130_stepper_y:virtual_endstop
position_endstop: -4
position_max: 305
position_min: -4
homing_speed: 70
# https://www.klipper3d.org/TMC_Drivers.html?h=sensorless+homing#configure-printercfg-for-sensorless-homing
# The homing_retract_dist setting should be set to zero to disable the second homing move as a second pass is not needed, and attempts to do so are error prone.
homing_retract_dist: 0

[stepper_z]
step_pin: PC2
dir_pin: !PL2
enable_pin: !PA5
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 385
position_min: -2
homing_speed: 13.333

[extruder]
step_pin: PC3
dir_pin: PL6
enable_pin: !PA4
microsteps: 32
