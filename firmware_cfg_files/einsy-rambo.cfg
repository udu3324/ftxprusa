# WARNING: DO NOT EDIT THIS FILE UNLESS YOU KNOW WHAT YOU ARE DOING

[temperature_sensor einsy_board]
sensor_pin: PF6
sensor_type: TDK NTCG104LH104JT1
min_temp: -10
max_temp: 70

[probe]
pin: ^PB4
x_offset: 23
y_offset: 5
speed: 20.0
samples: 3 # Sampling, primarily for bed mesh. 3 is fine for normal PINDA probes.
samples_result: average
sample_retract_dist: 1.0
# samples_tolerance: 0.2 # it should be 0.02 at spec, but klipper default is 0.1
samples_tolerance_retries: 1 # default is zero, which stops it

[gcode_arcs]
resolution: 0.25

[bed_screws]
screw1: 0,0
screw1_name: Front Left
screw2: 0,245
screw2_name: Front Center Left
screw3: 0,386
screw3_name: Front Center Right
screw4: 0,650
screw4_name: Front Right

screw5: 300,0
screw5_name: Back Left
screw6: 300,245
screw6_name: Back Center Left
screw7: 300,386
screw7_name: Back Center Right
screw8: 300,650
screw8_name: Back Right

[extruder]
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PE5
sensor_type: ATC Semitec 104GT-2
sensor_pin: PF0

[heater_bed]
heater_pin: PG5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PF2
min_temp: 0
max_temp: 125


[heater_fan nozzle_cooling_fan]
pin: PH5
heater: extruder
heater_temp: 50.0
fan_speed: 1.0

# Part Cooling Fan
[fan]
pin: PH3
tachometer_pin: ^PE7
tachometer_poll_interval: 0.0015

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 80

[bed_mesh]
algorithm: bicubic
fade_end: 10
horizontal_move_z: 5
mesh_max: 650, 305
mesh_min: 24, 6
mesh_pps: 3
probe_count: 3,3 # normally 5,5 but can be 3,3
speed: 125


# Keeps Debug LED off / not floating
[static_digital_output debug_led]
pins: !PB7

[output_pin BEEPER_pin]
pin: PH2
pwm: True
value: 0
shutdown_value:0
cycle_time: 0.001
scale: 1000

[respond]
default_type: command

[filament_switch_sensor fsensor]
pause_on_runout: False #updated from True on 3/27/24
runout_gcode:
    M118 Filament Runout Detected
    M600
insert_gcode:
    M118 Filament Load Detected
    LOAD_FILAMENT
event_delay: 3.0
pause_delay: 0.01
switch_pin: ^!PK0

# Tools

[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]

[force_move]
enable_force_move: True
